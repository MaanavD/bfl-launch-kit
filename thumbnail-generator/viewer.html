<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Thumbnail Generator</title>

  <!-- Match the main site: Plus Jakarta Sans (body) + Instrument Serif (display) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Plus+Jakarta+Sans:wght@400;500;550;600&display=swap" rel="stylesheet">

  <style>
    /* ─── Tokens ─────────────────────────────────────────────── */
    :root {
      --font-body: "Plus Jakarta Sans", system-ui, sans-serif;
      --font-display: "Instrument Serif", Georgia, serif;

      --bg:             oklch(97.5% 0.005 85);
      --surface:        oklch(95% 0.008 85);
      --text:           oklch(20% 0.015 85);
      --text-secondary: oklch(45% 0.01 85);
      --text-muted:     oklch(58% 0.008 85);
      --border:         oklch(90% 0.01 85);
      --border-hi:      oklch(82% 0.01 85);
      --accent:         oklch(42% 0.1 155);
      --accent-hover:   oklch(36% 0.09 155);
      --code-bg:        oklch(94% 0.02 155);
      --code-text:      oklch(35% 0.08 155);

      /* Semantic */
      --error-bg:     oklch(95% 0.02 25);
      --error-text:   oklch(40% 0.12 25);
      --error-border: oklch(85% 0.04 25);

      /* Style badge tints */
      --badge-cinematic-bg:   oklch(92% 0.025 230);
      --badge-cinematic-text: oklch(38% 0.10 230);
      --badge-graphic-bg:     oklch(93% 0.025 50);
      --badge-graphic-text:   oklch(40% 0.10 50);
      --badge-abstract-bg:    oklch(92% 0.02 160);
      --badge-abstract-text:  oklch(38% 0.10 160);

      /* Spacing */
      --sp-1:  0.25rem;
      --sp-2:  0.5rem;
      --sp-3:  0.75rem;
      --sp-4:  1rem;
      --sp-5:  1.5rem;
      --sp-6:  2rem;
      --sp-8:  3rem;
      --sp-10: 4rem;
    }

    /* ─── Reset ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; color-scheme: light; scroll-behavior: smooth; }

    /* ─── Base ───────────────────────────────────────────────── */
    body {
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 400;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: var(--sp-6) var(--sp-5);
      padding-bottom: max(var(--sp-10), env(safe-area-inset-bottom));
    }

    a { color: inherit; text-decoration: none; }

    /* ─── Layout shell ────────────────────────────────────────── */
    .shell {
      max-width: 1080px;
      margin: 0 auto;
    }

    /* ─── Header ─────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: baseline;
      gap: var(--sp-4);
      margin-bottom: var(--sp-8);
      border-bottom: 1px solid var(--border);
      padding-bottom: var(--sp-5);
    }

    .header-wordmark {
      font-family: var(--font-display);
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1;
      white-space: nowrap;
    }

    .header-sep {
      width: 1px;
      height: 1.2em;
      background: var(--border-hi);
      flex-shrink: 0;
      align-self: center;
    }

    .header-topic {
      font-size: 0.9375rem;
      color: var(--text-secondary);
      line-height: 1.55;
      max-width: 65ch;
    }

    /* ─── Section label ───────────────────────────────────────── */
    .section-label {
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: var(--sp-4);
    }

    /* ─── Comparison grid ─────────────────────────────────────── */
    .comparison-section {
      margin-bottom: var(--sp-8);
    }

    .comparison-img-wrap {
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      background: var(--surface);
    }

    .comparison-img-wrap img {
      width: 100%;
      display: block;
    }

    /* ─── Thumbnails grid ─────────────────────────────────────── */
    .thumbnails-section {
      margin-bottom: var(--sp-8);
    }

    .thumbnails {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 400px), 1fr));
      gap: var(--sp-5);
    }

    /* ─── Thumbnail card ──────────────────────────────────────── */
    .thumb-card {
      background: var(--surface);
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border);
      transition:
        border-color 0.2s cubic-bezier(0.25, 1, 0.5, 1),
        box-shadow   0.2s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .thumb-card:hover {
      border-color: var(--border-hi);
      box-shadow: 0 2px 12px oklch(20% 0.01 85 / 0.06);
    }

    .thumb-card img {
      width: 100%;
      display: block;
    }

    /* ─── Card info strip ─────────────────────────────────────── */
    .card-info {
      padding: var(--sp-4) var(--sp-5);
      display: flex;
      flex-direction: column;
      gap: var(--sp-3);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-3);
    }

    .style-badge {
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      padding: var(--sp-1) var(--sp-2);
      border-radius: 3px;
    }

    .style-badge--cinematic {
      background: var(--badge-cinematic-bg);
      color: var(--badge-cinematic-text);
    }
    .style-badge--graphic {
      background: var(--badge-graphic-bg);
      color: var(--badge-graphic-text);
    }
    .style-badge--abstract {
      background: var(--badge-abstract-bg);
      color: var(--badge-abstract-text);
    }

    /* Copy button */
    .copy-btn {
      font-family: var(--font-body);
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid var(--border);
      padding: var(--sp-1) var(--sp-3);
      border-radius: 3px;
      cursor: pointer;
      white-space: nowrap;
      transition:
        color        0.12s cubic-bezier(0.25, 1, 0.5, 1),
        border-color 0.12s cubic-bezier(0.25, 1, 0.5, 1),
        background   0.12s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .copy-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--code-bg);
    }

    .copy-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .copy-btn[data-copied="true"] {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--code-bg);
    }

    /* Prompt text */
    .prompt-text {
      font-size: 0.8125rem;
      line-height: 1.55;
      color: var(--text-secondary);
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ─── Footer meta ─────────────────────────────────────────── */
    .footer-meta {
      font-size: 0.6875rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      flex-wrap: wrap;
    }

    .footer-meta .dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
    }

    /* ─── Empty / error state ─────────────────────────────────── */
    .state-error {
      background: var(--error-bg);
      color: var(--error-text);
      border: 1px solid var(--error-border);
      border-radius: 6px;
      padding: var(--sp-5);
      font-size: 0.8125rem;
      line-height: 1.6;
    }

    .state-error code {
      background: oklch(90% 0.02 25);
      padding: 0.1em 0.4em;
      border-radius: 3px;
      font-family: "SF Mono", "Cascadia Code", "Fira Code", ui-monospace, monospace;
      font-size: 0.95em;
    }

    /* ─── Reduced motion ─────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }

    /* ─── Responsive ─────────────────────────────────────────── */
    @media (max-width: 640px) {
      body { padding: var(--sp-5) var(--sp-4); }
      .header { flex-direction: column; gap: var(--sp-2); }
      .header-sep { display: none; }
      .thumbnails { grid-template-columns: 1fr; }
    }

    @media (min-width: 1200px) {
      .thumbnails { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <div class="shell">

    <!-- Header -->
    <header class="header">
      <span class="header-wordmark">Thumbnail Generator</span>
      <div class="header-sep" aria-hidden="true"></div>
      <p class="header-topic" id="topic">Loading…</p>
    </header>

    <!-- Comparison grid -->
    <section class="comparison-section" aria-label="Side-by-side comparison">
      <p class="section-label">Comparison</p>
      <div class="comparison-img-wrap">
        <img
          src="output/comparison.jpg"
          alt="All three thumbnail styles side by side"
          onerror="this.closest('.comparison-img-wrap').style.display='none'"
        >
      </div>
    </section>

    <!-- Individual thumbnails -->
    <section class="thumbnails-section" aria-label="Individual thumbnails">
      <p class="section-label">Directions</p>
      <div class="thumbnails" id="thumbnails"></div>
    </section>

    <!-- Footer -->
    <footer>
      <div class="footer-meta" id="meta"></div>
    </footer>

  </div><!-- .shell -->

  <script>
    const STYLES = [
      { name: "Cinematic", cls: "cinematic" },
      { name: "Graphic",   cls: "graphic"   },
      { name: "Abstract",  cls: "abstract"  },
    ];

    async function loadMetadata() {
      try {
        const res = await fetch("output/metadata.json");
        if (!res.ok) throw new Error("not found");
        return await res.json();
      } catch {
        return null;
      }
    }

    function escAttr(str) {
      return str.replace(/&/g, "&amp;").replace(/"/g, "&quot;");
    }

    function escHTML(str) {
      const d = document.createElement("div");
      d.textContent = str;
      return d.innerHTML;
    }

    function copyPrompt(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = "Copied";
        btn.dataset.copied = "true";
        setTimeout(() => {
          btn.textContent = "Copy prompt";
          delete btn.dataset.copied;
        }, 2000);
      }).catch(() => {
        /* Clipboard not available — silently ignore */
      });
    }

    async function render() {
      const data = await loadMetadata();
      const container = document.getElementById("thumbnails");
      const topicEl  = document.getElementById("topic");
      const metaEl   = document.getElementById("meta");

      if (!data) {
        topicEl.textContent = "No results yet";
        container.innerHTML = `<div class="state-error">No output found. Run <code>node src/index.js "Your video description"</code> first, then refresh.</div>`;
        return;
      }

      topicEl.textContent = data.description;

      // Footer meta
      const parts = [`Generated ${new Date(data.generated_at).toLocaleString()}`];
      if (data.face) parts.push(`Face reference: ${data.face}`);
      metaEl.innerHTML = parts.map((p, i) =>
        i === 0 ? escHTML(p) : `<span class="dot" aria-hidden="true"></span>${escHTML(p)}`
      ).join("");

      // Thumbnail cards
      data.prompts.forEach((prompt, i) => {
        const style = STYLES[i] ?? { name: `Style ${i + 1}`, cls: "cinematic" };
        const card = document.createElement("article");
        card.className = "thumb-card";
        card.innerHTML = `
          <img
            src="output/thumbnail_${i + 1}.jpg"
            alt="${escAttr(style.name)} direction"
            loading="lazy"
          >
          <div class="card-info">
            <div class="card-header">
              <span class="style-badge style-badge--${style.cls}">${escHTML(style.name)}</span>
              <button
                class="copy-btn"
                type="button"
                aria-label="Copy ${escAttr(style.name)} prompt to clipboard"
                data-prompt="${escAttr(prompt)}"
              >Copy prompt</button>
            </div>
            <p class="prompt-text" title="${escAttr(prompt)}">${escHTML(prompt)}</p>
          </div>
        `;

        // Event delegation on the button
        card.querySelector(".copy-btn").addEventListener("click", function () {
          copyPrompt(this.dataset.prompt, this);
        });

        container.appendChild(card);
      });
    }

    render();
  </script>
</body>
</html>
