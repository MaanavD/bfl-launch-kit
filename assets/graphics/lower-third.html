<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Lower Third — FluxBot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    background: #0a0a0f;
    display: flex;
    align-items: flex-end;
    justify-content: flex-start;
    font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
    padding: 0 0 60px 60px;
  }

  .bar {
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(12px);
    border-left: 3px solid rgba(255,255,255,0.6);
    padding: 16px 32px 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .bar .title {
    font-size: 22px;
    font-weight: 600;
    color: #fff;
  }

  .bar .subtitle {
    font-size: 16px;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
  }
</style>
</head>
<body>
  <div class="bar">
    <div class="title">FluxBot — Open Source Discord Image Bot</div>
    <div class="subtitle">Powered by Black Forest Labs FLUX.2 API</div>
  </div>
</body>
</html>
